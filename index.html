<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📚 AI Study Assistant</h1>

    <!-- Dark Mode Button -->
    <button onclick="toggleMode()">🌙 Toggle Dark Mode</button>

    <!-- Ask Question -->
    <div class="card">
        <h2>Ask Question</h2>
        <input type="text" id="question" placeholder="Ask something...">
        <button onclick="getAnswer()">Get Answer</button>
        <p id="answer"></p>

        <h3>History:</h3>
        <p id="history"></p>
    </div>

    <!-- Notes Generator -->
    <div class="card">
        <h2>Generate Notes</h2>
        <input type="text" id="topic" placeholder="Enter topic">
        <button onclick="generateNotes()">Generate</button>
        <p id="notes"></p>
    </div>

    <!-- Study Tips -->
    <div class="card">
        <h2>Study Tips</h2>
        <ul>
            <li>📌 Study daily</li>
            <li>📌 Revise regularly</li>
            <li>📌 Practice coding</li>
        </ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
